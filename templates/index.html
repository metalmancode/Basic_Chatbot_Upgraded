<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Pro - Upgraded</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for Settings -->
        <aside class="settings-panel">
            <h2 class="panel-title">Model Settings</h2>
            
            <div class="setting-group">
                <label for="system_prompt">System Prompt</label>
                <textarea id="system_prompt" placeholder="Define bot behavior...">You are a helpful AI assistant. Give short and concise answers in 2-3 lines.</textarea>
            </div>

            <div class="setting-group">
                <label for="temperature">Temperature: <span id="temp-val">0.5</span></label>
                <input type="range" id="temperature" min="0.1" max="1.5" step="0.1" value="0.5">
            </div>

            <div class="setting-group">
                <label for="top_p">Top P: <span id="top-p-val">0.8</span></label>
                <input type="range" id="top_p" min="0.1" max="1.0" step="0.05" value="0.8">
            </div>

            <div class="setting-group">
                <label for="max_tokens">Max Tokens: <span id="max-tokens-val">60</span></label>
                <input type="range" id="max_tokens" min="10" max="256" step="10" value="60">
            </div>

            <button id="reset-btn" class="btn btn-secondary">Clear History</button>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <h1>Basic Chatbot <span class="badge">Upgraded</span></h1>
                <p>Powered by SmolLM2-360M</p>
            </header>

            <div id="chat-window" class="chat-window">
                <div class="message bot-message">
                    Hello! I'm your upgraded AI assistant. How can I help you today?
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
                <button id="send-btn" class="btn btn-primary">Send</button>
            </div>
        </main>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const resetBtn = document.getElementById('reset-btn');

        // Update UI value displays
        ['temperature', 'top_p', 'max_tokens'].forEach(id => {
            const el = document.getElementById(id);
            const val = document.getElementById(id.replace('_', '-') + '-val');
            el.addEventListener('input', () => val.textContent = el.value);
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // Display user message
            addMessage(message, 'user-message');
            userInput.value = '';

            // Loading indicator
            const loadingMsg = addMessage('Thinking...', 'bot-message loading');

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        temperature: document.getElementById('temperature').value,
                        top_p: document.getElementById('top_p').value,
                        max_tokens: document.getElementById('max_tokens').value,
                        system_prompt: document.getElementById('system_prompt').value
                    })
                });

                const data = await response.json();
                loadingMsg.remove();

                if (data.error) {
                    addMessage(data.error, 'bot-message error');
                } else {
                    addMessage(data.response, 'bot-message');
                }
            } catch (err) {
                loadingMsg.remove();
                addMessage("Connection Error: The server is not responding. Please make sure the Flask app is running.", 'bot-message error');
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return div;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        resetBtn.addEventListener('click', async () => {
            chatWindow.innerHTML = '';
            addMessage("History cleared. How can I help?", 'bot-message');
            // Inform server to reset
            await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "RESET", reset: true, system_prompt: document.getElementById('system_prompt').value })
            });
        });
    </script>
</body>
</html>
